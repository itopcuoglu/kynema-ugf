name: Kynema-UGF-CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{github.ref}}-${{github.head_ref}}-ci
  cancel-in-progress: true

jobs:
  Formatting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run clang-format
      uses: jidicula/clang-format-action@v4.18.0
      with:
        clang-format-version: '22'
        check-path: '.'
  CPU:
    needs: Formatting
    runs-on: ubuntu-24.04
    container:
      image: roodj/kynema-snapshot:latest
      env:
          KYNEMA_MANAGER: /kynema-manager
          E4S_MACHINE: true
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Test
        run: |
          /bin/bash -c " \
            source ${KYNEMA_MANAGER}/start.sh && spack-start && \
            spack env activate e4s-build && \
            cd ${KYNEMA_MANAGER}/environments/e4s-build && \
            ln -s ${GITHUB_WORKSPACE} kynema-ugf && \
            spack develop --no-modify-concrete-specs --no-clone kynema-ugf@=main && \
            spack rm kynema && \
            spack add kynema-ugf@main+hypre+openfast+tioga+trilinos-solvers && \
            spack concretize -f && \
            spack install && \
            spack cd -b kynema-ugf && \
            spack build-env kynema-ugf ctest -L unit --output-on-failure \
          "
